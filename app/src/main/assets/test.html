<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Tampilan APK</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f4f4;
}

/* Header */
header{
    background:#4CAF50;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* Container */
.container{
    padding:15px;
}

/* Card */
.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

/* Button */
button{
    background:#4CAF50;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#45a049;
}

/* Input */
input{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

/* Footer */
footer{
    text-align:center;
    padding:10px;
    background:#ddd;
    font-size:12px;
}
</style>
</head>

<body>

<header>
Test Tampilan APK
</header>

<div class="container">

<div class="card">
<h3>Contoh Card</h3>
<p>Ini adalah contoh card untuk melihat tampilan layout di aplikasi.</p>
<button onclick="alert('Tombol ditekan!')">Klik Saya</button>
</div>

<div class="card">
<h3>Form Test</h3>
<label>Nama</label>
<input type="text" placeholder="Masukkan nama">

<label>Email</label>
<input type="email" placeholder="Masukkan email">

<button>Kirim</button>
</div>

<div class="card">
<h3>Gambar</h3>
<img src="https://picsum.photos/300/150" style="width:100%; border-radius:8px;">
</div>

</div>

<footer>
© 2026 Test APK
</footer>

</body>
</html>
